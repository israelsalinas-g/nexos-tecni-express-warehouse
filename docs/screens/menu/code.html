<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar Shell -->
<header class="bg-surface border-b border-outline-variant fixed top-0 left-0 w-full z-50 flex justify-between items-center px-edge_margin py-sm h-[64px]">
<div class="flex items-center gap-md">
<button class="text-primary active:opacity-80 active:scale-95 transition-all">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
<h1 class="text-headline-lg font-headline-lg font-bold text-primary">TECNI EXPRESS</h1>
</div>
<div class="flex items-center gap-md">
<button class="text-primary active:opacity-80 active:scale-95 transition-all relative">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
<span class="absolute top-0 right-0 w-2 h-2 bg-error rounded-full border border-surface"></span>
</button>
</div>
</header>
<main class="flex-grow pt-[80px] pb-[80px] px-edge_margin">
<!-- Hero Branding Section -->
<section class="mb-xl mt-md">
<div class="relative w-full h-[160px] rounded-xl overflow-hidden shadow-sm">
<img class="w-full h-full object-cover" data-alt="A clean industrial laboratory setting with technical equipment and tools arranged with extreme precision on a white workbench. The lighting is bright and clinical, reflecting a modern corporate atmosphere. The color palette focuses on deep forest greens and neutral greys to align with the Tecni Express brand. High-resolution photography captures the texture of brushed metal and clean surfaces." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCWBshs_FKH7MRR-_Lo4f-esa5TOekhd_40iTZGFTbJeu43fpCBpTACh87iuj_CK2OGNreha3g0vwZMLsP1vp_TKvOWla9_tV6zw8BFnlkuZEuN19JsdfLpGUbUlnMYdCH1z2pbR4ykhDqZBPFp1XyOavZ-F3KU_usIDKHqOH7OB8QNPT4ChnrpIrpFNgkio6f9AvMekJ8CGU4eDbffvCyP_Vms9NuYS_ZMWbWcBHgbo5hsoXdU6CxHZFmPhgy-3ewM4PmvFDA-6MVM"/>
<div class="absolute inset-0 bg-gradient-to-r from-primary/90 to-transparent flex flex-col justify-center px-lg">
<h2 class="text-white text-headline-md font-headline-md mb-xs">Bienvenido, Operador</h2>
<p class="text-white/80 text-body-md font-body-md">Gestión técnica y operativa centralizada.</p>
</div>
</div>
</section>
<!-- Bento Grid Modules -->
<div class="grid grid-cols-2 md:grid-cols-3 gap-md">
<!-- Dashboard Card (Large) -->
<button class="col-span-2 bg-surface-container-low border border-outline-variant rounded-xl p-lg flex flex-col items-start gap-sm hover:bg-surface-container-high transition-colors active:scale-95 duration-150">
<div class="bg-primary-container p-md rounded-full mb-sm">
<span class="material-symbols-outlined text-on-primary-container text-[32px]" data-icon="dashboard">dashboard</span>
</div>
<div class="text-left">
<h3 class="text-headline-md font-headline-md text-on-surface">Dashboard</h3>
<p class="text-body-md text-on-surface-variant">Vista general de operaciones y KPIs.</p>
</div>
</button>
<!-- Inventario -->
<button class="bg-surface-container-lowest border border-outline-variant rounded-xl p-md flex flex-col items-center justify-center gap-sm hover:bg-surface-container transition-colors active:scale-95 duration-150">
<div class="text-primary">
<span class="material-symbols-outlined text-[40px]" data-icon="inventory_2">inventory_2</span>
</div>
<span class="text-label-sm font-label-sm text-on-surface font-bold">Inventario</span>
</button>
<!-- Facturación -->
<button class="bg-surface-container-lowest border border-outline-variant rounded-xl p-md flex flex-col items-center justify-center gap-sm hover:bg-surface-container transition-colors active:scale-95 duration-150">
<div class="text-primary">
<span class="material-symbols-outlined text-[40px]" data-icon="receipt_long">receipt_long</span>
</div>
<span class="text-label-sm font-label-sm text-on-surface font-bold">Facturación</span>
</button>
<!-- Bodegas -->
<button class="bg-surface-container-lowest border border-outline-variant rounded-xl p-md flex flex-col items-center justify-center gap-sm hover:bg-surface-container transition-colors active:scale-95 duration-150">
<div class="text-primary">
<span class="material-symbols-outlined text-[40px]" data-icon="warehouse">warehouse</span>
</div>
<span class="text-label-sm font-label-sm text-on-surface font-bold">Bodegas</span>
</button>
<!-- Servicio Técnico (Highlight) -->
<button class="col-span-2 bg-primary text-on-primary rounded-xl p-lg flex items-center justify-between hover:opacity-90 transition-all active:scale-[0.98] duration-150">
<div class="flex flex-col items-start">
<h3 class="text-headline-md font-headline-md">Servicio Técnico</h3>
<p class="opacity-80 text-body-md">Tickets y órdenes de trabajo activas</p>
</div>
<div class="bg-white/20 p-md rounded-xl">
<span class="material-symbols-outlined text-[36px]" data-icon="confirmation_number">confirmation_number</span>
</div>
</button>
<!-- Contactos -->
<button class="bg-surface-container-lowest border border-outline-variant rounded-xl p-md flex flex-col items-center justify-center gap-sm hover:bg-surface-container transition-colors active:scale-95 duration-150">
<div class="text-primary">
<span class="material-symbols-outlined text-[40px]" data-icon="contacts">contacts</span>
</div>
<span class="text-label-sm font-label-sm text-on-surface font-bold">Contactos</span>
</button>
</div>
<!-- Quick Status Section -->
<div class="mt-xl p-lg bg-surface-container rounded-xl">
<h4 class="text-label-sm font-label-sm text-on-surface-variant uppercase tracking-wider mb-md">Resumen de Hoy</h4>
<div class="flex justify-between items-center">
<div class="flex flex-col">
<span class="text-headline-md font-bold text-primary">12</span>
<span class="text-label-sm text-on-surface-variant">Tickets Pendientes</span>
</div>
<div class="h-10 w-[1px] bg-outline-variant"></div>
<div class="flex flex-col">
<span class="text-headline-md font-bold text-primary">04</span>
<span class="text-label-sm text-on-surface-variant">Transferencias</span>
</div>
<div class="h-10 w-[1px] bg-outline-variant"></div>
<div class="flex flex-col">
<span class="text-headline-md font-bold text-error">02</span>
<span class="text-label-sm text-on-surface-variant">Stock Bajo</span>
</div>
</div>
</div>
</main>

<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-sm pb-safe h-[56px] bg-surface border-t border-outline-variant">
<!-- Dashboard Active -->
<a class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-full px-md py-xs scale-90 transition-transform duration-150" href="#">
<span class="material-symbols-outlined" data-icon="dashboard">dashboard</span>

<span class="material-symbols-outlined" data-icon="receipt_long">receipt_long</span>

<span class="material-symbols-outlined" data-icon="contacts">contacts</span>
<span class="text-label-sm font-label-sm">Contactos</span>
